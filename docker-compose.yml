# docker-compose.yml for rill erosion runtime
# Runs erosion.sh in a long-running container with persistent data storage
# Uses the texlive user from the base image (UID 1000)

services:
  erosion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rill-erosion
    volumes:
      # Mount data directory for publishing eroded scores
      - data:/mnt/archive/public/rill/
    working_dir: /src
    # Run as texlive user (UID 1000 in base image)
    user: "texlive"
    environment:
      # Use texlive user's home directory
      - HOME=/home/texlive
      # Note: PUSH_REMOTE=TRUE requires git credentials in container (not configured by default)
      - PUSH_REMOTE=${PUSH_REMOTE:-FALSE}
      - EROSION_BRANCH=${EROSION_BRANCH:-erosion_prima}
    command: ["bash", "-c", "\
        set -e; \
        export PATH=$$HOME/.local/bin:$$PATH; \
        rm -rf .venv; \
        uv venv; \
        . .venv/bin/activate; \
        uv pip install -e .; \
        git config --global --add safe.directory /src; \
        git config --global user.email 'erosion@rill.local'; \
        git config --global user.name 'Erosion Bot'; \
        git switch -c ${EROSION_BRANCH:-erosion_prima}; \
        ./erosion.sh ./erosion/erosion.py . ${PUSH_REMOTE:-FALSE}\
      "]
    restart: unless-stopped

volumes:
  data:
